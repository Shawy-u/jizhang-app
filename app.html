<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="记账本">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <title>记账本 - 轻松理财</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div id="app">
        <!-- 头部导航 -->
        <header class="app-header">
            <div class="header-top">
                <div class="brand">
                    <span class="brand-icon">💰</span>
                    <h1 class="brand-title">记账本</h1>
                </div>
                <button class="btn-add" id="btnAdd" aria-label="记一笔">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>记一笔</span>
                </button>
            </div>
            <!-- 月份选择器 -->
            <div class="month-picker" id="monthPicker">
                <button class="month-arrow" id="prevMonth" aria-label="上一月">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span class="month-label" id="monthLabel"></span>
                <button class="month-arrow" id="nextMonth" aria-label="下一月">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
        </header>

        <!-- 统计卡片 -->
        <section class="stats-section" id="statsSection">
            <div class="stats-card">
                <div class="stat-item stat-income">
                    <span class="stat-label">收入</span>
                    <span class="stat-value" id="totalIncome">0.00</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item stat-expense">
                    <span class="stat-label">支出</span>
                    <span class="stat-value" id="totalExpense">0.00</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item stat-balance">
                    <span class="stat-label">结余</span>
                    <span class="stat-value" id="totalBalance">0.00</span>
                </div>
            </div>
        </section>

        <!-- Tab 切换 -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="list">明细</button>
            <button class="tab-btn" data-tab="chart">统计</button>
        </div>

        <!-- 记录列表 -->
        <section class="tab-content active" id="tabList">
            <div class="transaction-list" id="transactionList">
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <div class="empty-text">暂无记录</div>
                    <div class="empty-hint">点击右上角"记一笔"开始记账</div>
                </div>
            </div>
        </section>

        <!-- 统计图表 -->
        <section class="tab-content" id="tabChart">
            <div class="chart-section" id="chartSection"></div>
        </section>

        <!-- 添加记录弹窗 -->
        <div class="modal-overlay" id="addModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>记一笔</h2>
                    <button class="modal-close" id="modalClose" aria-label="关闭">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <form id="addForm">
                    <!-- 收入/支出切换 -->
                    <div class="type-toggle">
                        <button type="button" class="type-btn active" data-type="expense">支出</button>
                        <button type="button" class="type-btn" data-type="income">收入</button>
                    </div>
                    <!-- 金额 -->
                    <div class="form-group">
                        <label class="form-label">金额</label>
                        <div class="amount-input-wrap">
                            <span class="currency-sign">¥</span>
                            <input type="number" id="inputAmount" class="amount-input" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal" required>
                        </div>
                    </div>
                    <!-- 分类 -->
                    <div class="form-group">
                        <label class="form-label">分类</label>
                        <div class="category-grid" id="categoryGrid"></div>
                    </div>
                    <!-- 备注 -->
                    <div class="form-group">
                        <label class="form-label">备注</label>
                        <input type="text" id="inputNote" class="form-input" placeholder="添加备注（可选）" maxlength="50">
                    </div>
                    <!-- 日期 -->
                    <div class="form-group">
                        <label class="form-label">日期</label>
                        <input type="date" id="inputDate" class="form-input" required>
                    </div>
                    <!-- 提交 -->
                    <button type="submit" class="btn-submit" id="btnSubmit">保存</button>
                </form>
            </div>
        </div>

        <!-- 删除确认 -->
        <div class="modal-overlay" id="deleteModal">
            <div class="confirm-dialog">
                <div class="confirm-icon">🗑️</div>
                <div class="confirm-text">确定删除这条记录吗？</div>
                <div class="confirm-actions">
                    <button class="btn-cancel" id="cancelDelete">取消</button>
                    <button class="btn-confirm-delete" id="confirmDelete">删除</button>
                </div>
            </div>
        </div>

        <!-- Toast 提示 -->
        <div class="toast" id="toast"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
